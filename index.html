<!DOCTYPE html>
<html lang="no"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1115"><meta name="description" content="Festivalplan v5 for Øya og Tons of Rock med favoritter, bør se og personlig plan.">
<link rel="manifest" href="manifest.json"><title>Festivalplan v5</title>
<style>
:root{--bg:#0f1115;--panel:#171a21;--panel2:#1f2430;--card:#131823;--text:#f4f7fb;--muted:#cbd5e1;--border:#2c3442;--accent:#86efac;--btn:#2a3140;--btn2:#3a4456;--star:#facc15}
*{box-sizing:border-box} html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif} body{-webkit-text-size-adjust:100%}
.app{max-width:980px;margin:0 auto;padding:16px 16px 28px} h1{margin:0 0 8px;font-size:1.55rem;line-height:1.15} p{margin:0}
.lead{color:#e2e8f0;line-height:1.45;margin-bottom:8px;font-size:.97rem}.note{color:var(--muted);line-height:1.45;margin-bottom:14px;font-size:.9rem}.bar{position:static;background:transparent;padding:0 0 12px}
.tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0 10px}.tab{background:var(--btn);color:var(--text);border:none;border-radius:10px;min-height:42px;font-size:.88rem;padding:10px 6px;cursor:pointer}.tab.active{background:var(--btn2)}
.toolbar{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:12px} input[type="search"],select{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:10px;min-height:42px;padding:10px 12px;font-size:.95rem}
.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{background:var(--panel2);color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:8px 10px;font-size:.85rem;cursor:pointer}.chip.active{color:var(--text);border-color:#4b5563}
details{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px} summary{list-style:none;cursor:pointer;padding:14px 16px;background:var(--panel2);font-weight:700;display:flex;justify-content:space-between;gap:12px;align-items:center;font-size:.98rem} summary::-webkit-details-marker{display:none}
.count{color:var(--muted);font-weight:600;font-size:.9rem;white-space:nowrap}.cards{padding:10px}.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}.card:last-child{margin-bottom:0}
.title{font-weight:700;color:#fff;font-size:1rem;line-height:1.25}.sub{color:var(--muted);font-size:.9rem;margin-top:4px;line-height:1.35}.meta{color:var(--accent);font-size:.9rem;font-weight:600;margin-top:6px;line-height:1.35}.why{color:var(--muted);font-size:.92rem;line-height:1.45;margin-top:8px}
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.btn{background:var(--btn);color:var(--text);border:none;border-radius:10px;min-height:42px;padding:10px 8px;text-decoration:none;display:flex;align-items:center;justify-content:center;text-align:center;font-size:.92rem;cursor:pointer}.btn:hover{background:var(--btn2)}.fav.active{color:var(--star)}
.empty{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;color:var(--muted);line-height:1.5}.pill{display:inline-block;margin-top:6px;background:#243041;color:#dbeafe;border-radius:999px;padding:5px 8px;font-size:.78rem}.footer{color:var(--muted);font-size:.85rem;line-height:1.5;margin-top:16px}
@media (min-width:721px){.app{padding:24px}h1{font-size:1.9rem}.tabs{grid-template-columns:repeat(5,1fr)}.toolbar{grid-template-columns:1.2fr .8fr}.actions{width:auto;grid-template-columns:auto auto auto}}
</style></head><body>
<div class="app"><div class="bar"><h1>Festivalplan v5</h1><p class="lead">Øya + Tons of Rock i én mobilvennlig PWA, med favoritter, «bør se» og personlig plan.</p><p class="note">Dette er en ren nybygget v5. Twisted Sister er fjernet fra Tons of Rock-delen.</p>
<div class="tabs"><button class="tab active" data-view="festivaler">Festivaler</button><button class="tab" data-view="borses">Bør se</button><button class="tab" data-view="favoritter">Favoritter</button><button class="tab" data-view="plan">Min plan</button><button class="tab" data-view="om">Om</button></div>
<div class="toolbar"><input id="search" type="search" placeholder="Søk artist, sjanger eller lignende …"><select id="festivalFilter"><option value="Alle">Alle festivaler</option><option value="Øya">Øya</option><option value="Tons of Rock">Tons of Rock</option></select></div>
<div class="chips" id="dayChips"></div></div><main id="content"></main><div class="footer">Hvis du ser “Festivalplan v5” øverst, er riktig versjon lastet.</div></div>
<script>
const DATA = [{"festival": "Øya", "artist": "The Cure", "category": "Rock", "genre": "alternativ/post-punk", "day": "Onsdag 12. august", "stage": "Amfiet", "similar": ["Joy Division", "Siouxsie and the Banshees", "New Order"], "spotify": "https://open.spotify.com/search/The%20Cure", "link": "https://www.oyafestivalen.no/artister/the-cure"}, {"festival": "Øya", "artist": "Nick Cave & The Bad Seeds", "category": "Rock", "genre": "alternativ rock", "day": "Torsdag 13. august", "stage": "Amfiet", "similar": ["Tom Waits", "Leonard Cohen", "PJ Harvey"], "spotify": "https://open.spotify.com/search/Nick%20Cave%20%26%20The%20Bad%20Seeds", "link": "https://www.oyafestivalen.no/artister/nick-cave-and-the-bad-seeds"}, {"festival": "Øya", "artist": "Mogwai", "category": "Rock", "genre": "post-rock", "day": "Onsdag 12. august", "stage": "", "similar": ["Explosions in the Sky", "Godspeed You! Black Emperor", "Sigur Rós"], "spotify": "https://open.spotify.com/search/Mogwai", "link": "https://www.oyafestivalen.no/artister/mogwai"}, {"festival": "Øya", "artist": "SLOMOSA", "category": "Rock", "genre": "stoner rock", "day": "Fredag 14. august", "stage": "", "similar": ["Kyuss", "Queens of the Stone Age", "Truckfighters"], "spotify": "https://open.spotify.com/search/SLOMOSA", "link": "https://www.oyafestivalen.no/artister/slomosa"}, {"festival": "Øya", "artist": "Thomas Dybdahl", "category": "Singer-songwriter", "genre": "låtskriver", "day": "Fredag 14. august", "stage": "", "similar": ["José González", "Damien Rice", "Nick Drake"], "spotify": "https://open.spotify.com/search/Thomas%20Dybdahl", "link": "https://www.oyafestivalen.no/artister/thomas-dybdahl"}, {"festival": "Øya", "artist": "Annahstasia", "category": "Singer-songwriter", "genre": "soul/folk", "day": "Onsdag 12. august", "stage": "", "similar": ["Lianne La Havas", "Nina Simone", "Laura Marling"], "spotify": "https://open.spotify.com/search/Annahstasia", "link": "https://www.oyafestivalen.no/artister/annahstasia"}, {"festival": "Øya", "artist": "Ole Kirkeng", "category": "Singer-songwriter", "genre": "americana", "day": "Onsdag 12. august", "stage": "", "similar": ["Jason Isbell", "Tyler Childers", "Sturgill Simpson"], "spotify": "https://open.spotify.com/search/Ole%20Kirkeng", "link": "https://www.oyafestivalen.no/artister/ole-kirkeng"}, {"festival": "Øya", "artist": "Dagny", "category": "Pop", "genre": "pop", "day": "Lørdag 15. august", "stage": "Amfiet", "similar": ["Sigrid", "Zara Larsson", "Robyn"], "spotify": "https://open.spotify.com/search/Dagny", "link": "https://www.oyafestivalen.no/artister/dagny"}, {"festival": "Øya", "artist": "Underworld", "category": "Elektronisk", "genre": "techno/house", "day": "Lørdag 15. august", "stage": "", "similar": ["Orbital", "The Chemical Brothers", "Leftfield"], "spotify": "https://open.spotify.com/search/Underworld", "link": "https://www.oyafestivalen.no/artister/underworld"}, {"festival": "Tons of Rock", "artist": "Iron Maiden", "category": "Heavy metal", "genre": "heavy metal", "day": "Torsdag 25. juni", "stage": "", "similar": ["Judas Priest", "Dio", "Saxon"], "spotify": "https://open.spotify.com/search/Iron%20Maiden", "link": "https://www.tonsofrock.no/en/program"}, {"festival": "Tons of Rock", "artist": "Alice Cooper", "category": "Hard rock", "genre": "shock rock/hard rock", "day": "Torsdag 25. juni", "stage": "", "similar": ["KISS", "W.A.S.P.", "Rob Zombie"], "spotify": "https://open.spotify.com/search/Alice%20Cooper", "link": "https://www.tonsofrock.no/en/program"}, {"festival": "Tons of Rock", "artist": "Rival Sons", "category": "Hard rock", "genre": "hard rock/blues rock", "day": "Fredag 26. juni", "stage": "", "similar": ["Greta Van Fleet", "The Black Crowes", "Wolfmother"], "spotify": "https://open.spotify.com/search/Rival%20Sons", "link": "https://www.tonsofrock.no/en/program"}, {"festival": "Tons of Rock", "artist": "A Perfect Circle", "category": "Alternativ / modern", "genre": "alternativ rock/prog", "day": "Lørdag 27. juni", "stage": "", "similar": ["Tool", "Puscifer", "Deftones"], "spotify": "https://open.spotify.com/search/A%20Perfect%20Circle", "link": "https://www.tonsofrock.no/en/program"}, {"festival": "Tons of Rock", "artist": "Mayhem", "category": "Ekstremmetal", "genre": "black metal", "day": "Fredag 26. juni", "stage": "", "similar": ["Darkthrone", "Emperor", "Gorgoroth"], "spotify": "https://open.spotify.com/search/Mayhem", "link": "https://www.tonsofrock.no/en/program"}, {"festival": "Tons of Rock", "artist": "The Offspring", "category": "Punk / hardcore", "genre": "punk rock", "day": "Onsdag 24. juni", "stage": "", "similar": ["Green Day", "Bad Religion", "NOFX"], "spotify": "https://open.spotify.com/search/The%20Offspring", "link": "https://www.tonsofrock.no/en/program"}, {"festival": "Tons of Rock", "artist": "Babymetal", "category": "Prog / art / annet", "genre": "kawaii metal", "day": "Onsdag 24. juni", "stage": "", "similar": ["Electric Callboy", "Poppy", "Hanabie."], "spotify": "https://open.spotify.com/search/BABYMETAL", "link": "https://www.tonsofrock.no/en/program"}];
const MUSTSEE = [{"artist": "Nick Cave & The Bad Seeds", "why": "Mørk nerve, stor låtskriving og helt i din gate."}, {"artist": "The Cure", "why": "Ikonisk mørk alternativ rock med atmosfære."}, {"artist": "Mogwai", "why": "Tung, instrumental kraft og stor dynamikk."}, {"artist": "SLOMOSA", "why": "Tung stoner-rock med riff og groove."}, {"artist": "Thomas Dybdahl", "why": "Sterk låtskriver med musikalsk tyngde."}, {"artist": "Annahstasia", "why": "Vokal og låtskriving som kan treffe hardt."}, {"artist": "Iron Maiden", "why": "Klassisk metal på toppnivå live."}, {"artist": "Alice Cooper", "why": "Stor scene-personlighet og tung rockteater-energi."}, {"artist": "Rival Sons", "why": "Hard rock med blues-nerve som kan passe deg godt."}, {"artist": "A Perfect Circle", "why": "Mørk, melodisk og sofistikert tungrock."}, {"artist": "Mayhem", "why": "Hvis du vil ha den mørkere, mer kompromissløse siden."}];
const state = {view:'festivaler',search:'',festival:'Alle',day:'Alle',favorites: JSON.parse(localStorage.getItem('festival-favorites-v5') || '[]')};
const dayOrder = ['Onsdag 24. juni','Torsdag 25. juni','Fredag 26. juni','Lørdag 27. juni','Onsdag 12. august','Torsdag 13. august','Fredag 14. august','Lørdag 15. august'];
const content = document.getElementById('content'), searchInput = document.getElementById('search'), festivalFilter = document.getElementById('festivalFilter'), dayChips = document.getElementById('dayChips');
function saveFavorites(){localStorage.setItem('festival-favorites-v5', JSON.stringify(state.favorites))}
function toggleFavorite(artist){const i=state.favorites.indexOf(artist); if(i>=0) state.favorites.splice(i,1); else state.favorites.push(artist); saveFavorites(); render()}
function uniqueDays(){const days=[...new Set(DATA.map(x=>x.day))]; return dayOrder.filter(d=>days.includes(d))}
function renderDayChips(){const days=['Alle'].concat(uniqueDays()); dayChips.innerHTML=days.map(day=>'<button class="chip '+(state.day===day?'active':'')+'" data-day="'+day+'">'+day+'</button>').join(''); dayChips.querySelectorAll('.chip').forEach(btn=>btn.addEventListener('click',()=>{state.day=btn.dataset.day; render()}))}
function filtered(){const q=state.search.trim().toLowerCase(); return DATA.filter(item=>{const hay=[item.artist,item.genre,item.category,item.festival].concat(item.similar||[]).join(' ').toLowerCase(); return (!q||hay.includes(q))&&(state.festival==='Alle'||item.festival===state.festival)&&(state.day==='Alle'||item.day===state.day)})}
function grouped(items, by){const map=new Map(); items.forEach(item=>{const key=by==='festival-category'?(item.festival+'|||'+item.category):item[by]; if(!map.has(key)) map.set(key,[]); map.get(key).push(item)}); return Array.from(map.entries())}
function card(item){const active=state.favorites.includes(item.artist); return '<div class="card"><div class="title">'+item.artist+'</div><div class="sub">'+item.festival+' · '+item.category+' · '+item.genre+'</div><div class="meta">'+item.day+(item.stage?' · '+item.stage:'')+'</div><div class="pill">Kan minne om: '+item.similar.join(', ')+'</div><div class="actions"><button class="btn fav '+(active?'active':'')+'" data-fav="'+item.artist+'">'+(active?'★ Favoritt':'☆ Favoritt')+'</button><a class="btn" href="'+item.spotify+'" target="_blank" rel="noopener noreferrer">Spotify</a><a class="btn" href="'+item.link+'" target="_blank" rel="noopener noreferrer">Festival</a></div></div>'}
function bindFavButtons(){content.querySelectorAll('[data-fav]').forEach(btn=>btn.addEventListener('click',()=>toggleFavorite(btn.dataset.fav)))}
function renderFestivaler(){const items=filtered(); if(!items.length){content.innerHTML='<div class="empty">Ingen treff.</div>'; return} const groups=grouped(items,'festival-category'); content.innerHTML=groups.map(([key,arr])=>{const parts=key.split('|||'); return '<details open><summary>'+parts[0]+' · '+parts[1]+' <span class="count">('+arr.length+')</span></summary><div class="cards">'+arr.map(card).join('')+'</div></details>'}).join(''); bindFavButtons()}
function renderBorSe(){const lookup=new Map(DATA.map(item=>[item.artist,item])); const items=MUSTSEE.map(x=>{const base=lookup.get(x.artist); return base?Object.assign({},base,{why:x.why}):null}).filter(Boolean); content.innerHTML=items.map(item=>{const active=state.favorites.includes(item.artist); return '<div class="card"><div class="title">'+item.artist+'</div><div class="sub">'+item.festival+' · '+item.category+' · '+item.genre+'</div><div class="meta">'+item.day+(item.stage?' · '+item.stage:'')+'</div><div class="why">'+item.why+'</div><div class="actions"><button class="btn fav '+(active?'active':'')+'" data-fav="'+item.artist+'">'+(active?'★ Favoritt':'☆ Favoritt')+'</button><a class="btn" href="'+item.spotify+'" target="_blank" rel="noopener noreferrer">Spotify</a><a class="btn" href="'+item.link+'" target="_blank" rel="noopener noreferrer">Festival</a></div></div>'}).join(''); bindFavButtons()}
function renderFavoritter(){const items=filtered().filter(item=>state.favorites.includes(item.artist)); if(!items.length){content.innerHTML='<div class="empty">Ingen favoritter ennå.</div>'; return} const map=new Map(); items.forEach(item=>{if(!map.has(item.day)) map.set(item.day,[]); map.get(item.day).push(item)}); content.innerHTML=Array.from(map.entries()).map(([day,arr])=>'<details open><summary>'+day+' <span class="count">('+arr.length+')</span></summary><div class="cards">'+arr.map(card).join('')+'</div></details>').join(''); bindFavButtons()}
function renderPlan(){const items=DATA.filter(item=>state.favorites.includes(item.artist)); if(!items.length){content.innerHTML='<div class="empty">Min plan er tom.</div>'; return} const map=new Map(); items.forEach(item=>{if(!map.has(item.day)) map.set(item.day,[]); map.get(item.day).push(item)}); content.innerHTML=Array.from(map.entries()).map(([day,arr])=>'<details open><summary>'+day+' <span class="count">('+arr.length+' valgt)</span></summary><div class="cards">'+arr.map(card).join('')+'</div></details>').join(''); bindFavButtons()}
function renderAbout(){content.innerHTML='<div class="empty"><strong>Festivalplan v5</strong><br><br>Ny, ren bygget versjon med naturlig scrolling, bør se-fane, favoritter og plan. Twisted Sister er fjernet fra Tons-delen.</div>'}
function render(){document.querySelectorAll('.tab').forEach(btn=>btn.classList.toggle('active',btn.dataset.view===state.view)); if(state.view==='festivaler') renderFestivaler(); else if(state.view==='borses') renderBorSe(); else if(state.view==='favoritter') renderFavoritter(); else if(state.view==='plan') renderPlan(); else renderAbout()}
document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{state.view=btn.dataset.view; render()}));
searchInput.addEventListener('input',e=>{state.search=e.target.value; render()}); festivalFilter.addEventListener('change',e=>{state.festival=e.target.value; render()});
renderDayChips(); render();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js?v=5').catch(()=>{}))}
</script></body></html>
